<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendas e Estoque</title>
    <link rel="stylesheet" href="/front/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <h1>Vendas e Estoque</h1>
          <p>Cadastro de produtos, consulta de estoque e registro de vendas.</p>
        </div>
        <button class="button secondary" id="refresh-products" type="button">
          Atualizar
        </button>
      </section>

      <section class="grid">
        <form class="panel" id="product-form">
          <div class="panel-header">
            <h2>Novo produto</h2>
            <p>Inclua um item no estoque.</p>
          </div>

          <label>
            Nome
            <input id="product-name" name="nome" type="text" required />
          </label>

          <div class="form-row">
            <label>
              Preco
              <input
                id="product-price"
                name="preco"
                type="number"
                min="0.01"
                step="0.01"
                required
              />
            </label>

            <label>
              Quantidade
              <input
                id="product-quantity"
                name="quantidade"
                type="number"
                min="0"
                step="1"
                required
              />
            </label>
          </div>

          <button class="button" type="submit">Cadastrar produto</button>
        </form>

        <form class="panel" id="sale-form">
          <div class="panel-header">
            <h2>Nova venda</h2>
            <p>Escolha um produto e informe a quantidade.</p>
          </div>

          <label>
            Produto
            <select id="sale-product" name="produto_id" required>
              <option value="">Carregando produtos...</option>
            </select>
          </label>

          <label>
            Quantidade
            <input
              id="sale-quantity"
              name="quantidade"
              type="number"
              min="1"
              step="1"
              required
            />
          </label>

          <button class="button" type="submit">Registrar venda</button>
        </form>
      </section>

      <section class="panel inventory-panel">
        <div class="panel-header toolbar">
          <div>
            <h2>Produtos</h2>
            <p id="inventory-summary">Carregando estoque...</p>
          </div>
          <label class="checkbox">
            <input id="low-stock-filter" type="checkbox" />
            Mostrar estoque baixo
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Preco</th>
                <th>Quantidade</th>
              </tr>
            </thead>
            <tbody id="products-table">
              <tr>
                <td colspan="4">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <div class="toast" id="message" role="status" aria-live="polite"></div>
    </main>

    <script src="/front/app.js"></script>
  </body>
</html>
